specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Symphony
providerId: symphony
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Collaboration
  - Secure Messaging
  - Financial Services
  - Rate Limiting
description: Symphony does not publish standardized per-second / per-minute API rate-limit numbers in its public developer documentation. The Pod and Agent APIs apply per-tenancy throttling whose specific thresholds are managed by the customer's pod and surfaced through admin tooling rather than a public reference.
sources:
  - https://docs.developers.symphony.com/bots/overview-of-rest-api
  - https://developers.symphony.com
notes: No public rate-limit numbers documented. Limits are enforced at the customer's pod and may be tuned by the pod administrator; consult tenancy admin / Symphony support for exact thresholds.
responseCodes:
  throttled: 429
limits:
  - name: Pod-Level Throttling
    scope: tenant
    metric: varies
    limit: 'pod-administered; not publicly documented'
    notes: Symphony's Pod and Agent APIs are throttled at the customer's pod; thresholds depend on pod sizing and are surfaced via tenancy admin.
policies:
  - name: Bot / Application Authentication
    description: All API calls require session tokens issued by the Authenticator (mTLS) or Login (RSA) flows; rate-limit scoping is bot/extension-app per pod.
  - name: Datafeed Pacing
    description: The Agent API datafeed is intended for long-poll / streaming consumption; clients should not poll aggressively in tight loops.
  - name: Reference Tenancy Admin
    description: For specific limits, request the threshold values from your pod administrator or Symphony support.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
