specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Symphony
providerId: symphony
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Collaboration
  - Communication
  - Financial Services
  - Secure Messaging
description: Symphony is a secure collaboration platform sold to enterprise customers (primarily financial services). Pricing is contact-sales only - the website routes to "Request a Demo" / "Talk to Sales" rather than publishing a public pricing page. Pod, Agent, Authenticator, Login, Profile Manager, and Community Connect APIs are bundled with the customer's Symphony tenancy.
sources:
  - https://symphony.com
  - https://docs.developers.symphony.com
notes: No public pricing page. Symphony sells via direct sales / "Request a Demo"; per-pod, per-user, and Community Connect terms are negotiated as part of the enterprise contract. APIs are included with the tenancy at no separate per-call charge.
plans:
  - id: symphony-contact-sales
    name: Contact Sales
    type: enterprise
    description: Custom-priced enterprise tenancy. APIs (Pod, Agent, Authenticator, Login, Profile Manager, Community Connect) are bundled with the contracted Symphony pod and seat counts.
    entries:
      - label: Pod / Tenancy
        name: tenancy
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: Per-User Seat
        name: per_user_seat
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: Symphony Pod API
      - name: Symphony Agent API
      - name: Symphony Authenticator API
      - name: Symphony Login API
      - name: Symphony Profile Manager API
      - name: Symphony Community Connect API
      - name: Bundled with Tenancy
