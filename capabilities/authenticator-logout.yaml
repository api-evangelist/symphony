naftiko: 1.0.0-alpha2
info:
  label: Symphony Authenticator API — Logout
  description: 'Symphony Authenticator API — Logout. 1 operations. Lead operation: Symphony Logout. Self-contained Naftiko
    capability covering one Symphony business surface.'
  tags:
  - Symphony
  - Logout
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SYMPHONY_API_KEY: SYMPHONY_API_KEY
capability:
  consumes:
  - type: http
    namespace: authenticator-logout
    baseUri: ''
    description: Symphony Authenticator API — Logout business capability. Self-contained, no shared references.
    resources:
    - name: v1-logout
      path: /v1/logout
      operations:
      - name: post
        method: POST
        description: Symphony Logout
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sessionToken
          in: header
          type: string
          description: the session token to logout.
          required: true
  exposes:
  - type: rest
    namespace: authenticator-logout-rest
    port: 8080
    description: REST adapter for Symphony Authenticator API — Logout. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/logout
      name: v1-logout
      description: REST surface for v1-logout.
      operations:
      - method: POST
        name: post
        description: Symphony Logout
        call: authenticator-logout.post
        with:
          sessionToken: rest.sessionToken
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: authenticator-logout-mcp
    port: 9090
    transport: http
    description: MCP adapter for Symphony Authenticator API — Logout. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: symphony-logout
      description: Symphony Logout
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: authenticator-logout.post
      with:
        sessionToken: tools.sessionToken
      outputParameters:
      - type: object
        mapping: $.
