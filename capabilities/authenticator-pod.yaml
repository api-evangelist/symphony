naftiko: 1.0.0-alpha2
info:
  label: Symphony Authenticator API — Pod
  description: 'Symphony Authenticator API — Pod. 1 operations. Lead operation: Symphony Retrieve the certificate that can
    be use to validate the JWT token obtain

    through the extension application authentication flow.. Self-contained Naftiko capability covering one Symphony business
    surface.'
  tags:
  - Symphony
  - Pod
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SYMPHONY_API_KEY: SYMPHONY_API_KEY
capability:
  consumes:
  - type: http
    namespace: authenticator-pod
    baseUri: ''
    description: Symphony Authenticator API — Pod business capability. Self-contained, no shared references.
    resources:
    - name: v1-app-pod-certificate
      path: /v1/app/pod/certificate
      operations:
      - name: get
        method: GET
        description: Symphony Retrieve the certificate that can be use to validate the JWT token obtain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: authenticator-pod-rest
    port: 8080
    description: REST adapter for Symphony Authenticator API — Pod. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/app/pod/certificate
      name: v1-app-pod-certificate
      description: REST surface for v1-app-pod-certificate.
      operations:
      - method: GET
        name: get
        description: Symphony Retrieve the certificate that can be use to validate the JWT token obtain
        call: authenticator-pod.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: authenticator-pod-mcp
    port: 9090
    transport: http
    description: MCP adapter for Symphony Authenticator API — Pod. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: symphony-retrieve-certificate-that-can
      description: Symphony Retrieve the certificate that can be use to validate the JWT token obtain
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: authenticator-pod.get
      outputParameters:
      - type: object
        mapping: $.
