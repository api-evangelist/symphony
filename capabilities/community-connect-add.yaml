  - type: http
    namespace: community-connect-add
    baseUri: ''
    description: Symphony Community Connect API — Add business capability. Self-contained, no shared references.
    resources:
    - name: v1-channelco-company-companyId-user-userId-roles-add
      path: /v1/channelco/company/{companyId}/user/{userId}/roles/add
      operations:
      - name: addrole
        method: POST
        description: Symphony Adds a Role to a Channelco User's Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: integer
          description: symphony user id
          required: true
        - name: companyId
          in: path
