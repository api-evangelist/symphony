naftiko: 1.0.0-alpha2
info:
  label: Symphony Login API — Users
  description: 'Symphony Login API — Users. 1 operations. Lead operation: Symphony Authenticate an application in a delegated
    context to act on behalf of a user. Self-contained Naftiko capability covering one Symphony business surface.'
  tags:
  - Symphony
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SYMPHONY_API_KEY: SYMPHONY_API_KEY
capability:
  consumes:
  - type: http
    namespace: login-users
    baseUri: ''
    description: Symphony Login API — Users business capability. Self-contained, no shared references.
    resources:
    - name: pubkey-app-user-userId-authenticate
      path: /pubkey/app/user/{userId}/authenticate
      operations:
      - name: post
        method: POST
        description: Symphony Authenticate an application in a delegated context to act on behalf of a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sessionToken
          in: header
          type: string
          description: App Session authentication token.
          required: true
        - name: userId
          in: path
          type: integer
          description: the user ID
          required: true
  exposes:
  - type: rest
    namespace: login-users-rest
    port: 8080
    description: REST adapter for Symphony Login API — Users. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/pubkey/app/user/{userid}/authenticate
      name: pubkey-app-user-userid-authenticate
      description: REST surface for pubkey-app-user-userId-authenticate.
      operations:
      - method: POST
        name: post
        description: Symphony Authenticate an application in a delegated context to act on behalf of a user
        call: login-users.post
        with:
          sessionToken: rest.sessionToken
          userId: rest.userId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: login-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Symphony Login API — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: symphony-authenticate-application-delegated-context
      description: Symphony Authenticate an application in a delegated context to act on behalf of a user
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: login-users.post
      with:
        sessionToken: tools.sessionToken
        userId: tools.userId
      outputParameters:
      - type: object
        mapping: $.
