naftiko: "1.0.0-alpha1"

info:
  label: Symphony Pod API
  description: >-
    The Symphony Pod API provides core platform services: user management,
    stream and room management, connections, presence, certificates, and
    administrative operations.
  tags:
    - Administration
    - Connections
    - Messaging
    - Presence
    - Rooms
    - Streams
    - Symphony
    - User Management
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      SYMPHONY_SESSION_TOKEN: SYMPHONY_SESSION_TOKEN

capability:
  consumes:
    - type: http
      namespace: symphony-pod
      baseUri: https://acme.symphony.com
      description: Symphony Pod API for user and room management
      authentication:
        type: apikey
        key: sessionToken
        value: "{{SYMPHONY_SESSION_TOKEN}}"
        placement: header
      resources:
        - name: users
          path: /v3/users
          description: User lookup and management
          operations:
            - name: search-users
              method: GET
              description: Search for users by email or username
              inputParameters:
                - name: sessionToken
                  in: header
                  type: string
                  required: true
                  description: Session token
                - name: email
                  in: query
                  type: string
                  required: false
                  description: User email address
                - name: username
                  in: query
                  type: string
                  required: false
                  description: Username
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: rooms
          path: /v3/room
          description: Room (multi-party stream) management
          operations:
            - name: create-room
              method: POST
              description: Create a new room
              inputParameters:
                - name: sessionToken
                  in: header
                  type: string
                  required: true
                  description: Session token
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: search-rooms
              method: POST
              description: Search for rooms
              inputParameters:
                - name: sessionToken
                  in: header
                  type: string
                  required: true
                  description: Session token
              body:
                type: json
                data:
                  query: "{{tools.query}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-room-info
              method: GET
              description: Get information about a room
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: Room ID
                - name: sessionToken
                  in: header
                  type: string
                  required: true
                  description: Session token
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: connections
          path: /v1/connection
          description: User connection management
          operations:
            - name: list-connections
              method: GET
              description: List user connections
              inputParameters:
                - name: sessionToken
                  in: header
                  type: string
                  required: true
                  description: Session token
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: streams
          path: /v1/streams/list
          description: Stream listing and management
          operations:
            - name: list-streams
              method: POST
              description: List streams for the current user
              inputParameters:
                - name: sessionToken
                  in: header
                  type: string
                  required: true
                  description: Session token
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: admin-users
          path: /v2/admin/user/list
          description: Admin user management
          operations:
            - name: list-users-admin
              method: GET
              description: List all users (admin)
              inputParameters:
                - name: sessionToken
                  in: header
                  type: string
                  required: true
                  description: Session token
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: symphony-pod-rest
      resources:
        - path: /v1/users
          name: users
          description: User search and management
          operations:
            - method: GET
              name: search-users
              description: Search for users
              call: "symphony-pod.search-users"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/rooms
          name: rooms
          description: Room management
          operations:
            - method: POST
              name: create-room
              description: Create a new room
              call: "symphony-pod.create-room"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: GET
              name: search-rooms
              description: Search rooms
              call: "symphony-pod.search-rooms"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/streams
          name: streams
          description: Stream listing
          operations:
            - method: GET
              name: list-streams
              description: List streams
              call: "symphony-pod.list-streams"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: symphony-pod-mcp
      transport: http
      tools:
        - name: search-users
          description: Search for Symphony users by email or username
          hints:
            readOnly: true
            openWorld: false
          call: "symphony-pod.search-users"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-room
          description: Create a new Symphony room for collaboration
          hints:
            readOnly: false
            destructive: false
          call: "symphony-pod.create-room"
          outputParameters:
            - type: object
              mapping: "$."
        - name: search-rooms
          description: Search for Symphony rooms
          hints:
            readOnly: true
            openWorld: false
          call: "symphony-pod.search-rooms"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-connections
          description: List user connections in Symphony
          hints:
            readOnly: true
            openWorld: false
          call: "symphony-pod.list-connections"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-streams
          description: List available Symphony streams
          hints:
            readOnly: true
            openWorld: false
          call: "symphony-pod.list-streams"
          outputParameters:
            - type: object
              mapping: "$."
