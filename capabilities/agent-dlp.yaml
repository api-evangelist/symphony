        name: get
        description: Symphony Get All Dictionary Metadatas
        call: agent-dlp.get
        with:
          sessionToken: rest.sessionToken
          keyManagerToken: rest.keyManagerToken
          page: rest.page
          limit: rest.limit
        outputParameters:
