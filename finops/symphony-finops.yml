  InvoiceIssuerName: Symphony Communication Services, LLC
  BillingCurrency: USD
meters:
  - name: pod_tenancy
    description: Symphony pod tenancy - the foundational commercial unit covering Pod and Agent API access.
    unit: month
    aggregation: sum
  - name: licensed_seats
    description: Licensed user seats on the pod; the primary per-user commercial unit.
    unit: seat
    aggregation: max
  - name: community_connect_relationships
    description: Cross-tenant Community Connect relationships, typically negotiated separately.
    unit: relationship
    aggregation: count
principles:
  - name: Visibility
    description: Pod administrators see seat consumption and bot/app inventory through the Symphony admin console; cost reconciliation happens against the negotiated invoice rather than a usage API.
  - name: Allocation
    description: Allocate by business unit to seat counts and named bots; Community Connect cost can be allocated to the cross-firm relationship that owns it.
  - name: Optimization
    description: Optimize by reclaiming inactive seats, consolidating bots that hold redundant entitlements, and bundling Community Connect relationships at contract renewal.
  - name: Accountability
    description: Pod owner (typically central IT or compliance) and the Symphony account team jointly own commercial reviews; line-of-business sponsors own seat allocations.
